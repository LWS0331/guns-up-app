# Railway service config for the trainer MCP. Deploy as a SECOND service
# inside the Guns-up project (alongside the main `guns-up-app` Next service).
#
# Required env vars (set on the Railway service):
#   GUNS_UP_API_URL    = https://gunnyai.fit
#   OPERATOR_API_KEYS  = {"op-ruben":"k_live_rampage_…","op-britney":"k_live_valkyrie_…"}
#   PORT               = 3001  (Railway also auto-sets this)
#
# The same OPERATOR_API_KEYS env value MUST also be set on the main
# `guns-up-app` Next service so `requireTrainerAuth` validates the keys
# the MCP forwards upstream. They share the secret store by env — no DB.

[build]
builder = "DOCKERFILE"
dockerfilePath = "mcp-server/Dockerfile"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
